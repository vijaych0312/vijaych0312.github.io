<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vijay Kumar Chelluboyana</title>

<style>

body{
margin:0;
font-family: -apple-system, BlinkMacSystemFont, sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

.hero{
background:url("https://images.unsplash.com/photo-1555066931-4365d14bab8c") center/cover no-repeat;
}

.hero h1{
font-size:60px;
}

.hero p{
font-size:22px;
opacity:0.9;
}

.fade{
opacity:0;
transform:translateY(40px);
transition:all 1s ease;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

.skills{
background:#111;
}

.projects{
background:#000;
}

.contact{
background:#111;
}

img{
width:300px;
border-radius:20px;
margin-top:20px;
}

</style>

</head>

<body>

<section class="hero">
<h1 class="fade">Vijay Kumar Chelluboyana</h1>
<p class="fade">Cloud & DevOps Engineer</p>
</section>

<section class="skills">
<h2 class="fade">Building Scalable Cloud Infrastructure</h2>
<p class="fade">
AWS • Azure • Terraform • Kubernetes • CI/CD
</p>
<img class="fade" src="https://images.unsplash.com/photo-1518770660439-4636190af475">
</section>

<section class="projects">
<h2 class="fade">DevOps & Cloud Engineering</h2>
<p class="fade">
Designing automated infrastructure, Kubernetes clusters,
and enterprise CI/CD pipelines.
</p>
<img class="fade" src="https://images.unsplash.com/photo-1555949963-aa79dcee981c">
</section>

<section class="contact">
<h2 class="fade">Let's Connect</h2>
<p class="fade">
<a href="https://github.com/vijaych0312">GitHub</a> |
<a href="https://linkedin.com">LinkedIn</a>
</p>
</section>

<script>

const elements = document.querySelectorAll(".fade");

const observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
});

elements.forEach(el=>observer.observe(el));

</script>

</body>
</html>
