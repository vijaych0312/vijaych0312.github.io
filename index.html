<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vijay Kumar Chelluboyana | Cloud & DevOps Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
scroll-snap-type:y mandatory;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#1C1C1C,#1B2922);
color:#e6efe9;
overflow-x:hidden;
}

/* BACKGROUND */

.bg-wrapper{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
overflow:hidden;
}

.grid{
position:absolute;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(74,105,88,0.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(74,105,88,0.08) 1px, transparent 1px);
background-size:60px 60px;
}

.orb{
position:absolute;
border-radius:50%;
filter:blur(120px);
opacity:.25;
animation:float 20s ease-in-out infinite;
}

.orb1{
width:500px;
height:500px;
background:#4A6958;
top:-150px;
left:-120px;
}

.orb2{
width:420px;
height:420px;
background:#6f9180;
bottom:-180px;
right:-120px;
animation-delay:6s;
}

.orb3{
width:350px;
height:350px;
background:#3e574a;
top:40%;
left:60%;
animation-delay:10s;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0)}
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:rgba(27,41,34,0.9);
backdrop-filter:blur(10px);
border-bottom:1px solid #435146;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

.logo{
position:absolute;
left:40px;
font-size:22px;
font-weight:600;
letter-spacing:2px;
}

.nav-links{
display:flex;
gap:35px;
}

.nav-links a{
color:#cfd8d3;
font-size:16px;
display:flex;
align-items:center;
gap:8px;
text-decoration:none;
transition:.3s;
}

.nav-links a:hover{
color:#4A6958;
transform:scale(1.1);
}

/* HERO */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding-top:70px;
scroll-snap-align:start;
}

.hero-container{
width:1100px;
max-width:90%;
display:flex;
align-items:center;
justify-content:space-between;
gap:60px;
}

.hero-left{flex:1;}

.hero-right{
flex:1;
display:flex;
justify-content:center;
}

.hero-photo{
width:420px;
height:520px;
object-fit:cover;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.hero h1{
font-size:60px;
font-weight:700;
color:#ffffff;

text-shadow:
0 0 4px rgba(255,255,255,0.6),
0 0 10px rgba(255,255,255,0.4),
0 0 16px rgba(74,105,88,0.3);

letter-spacing:2px;
}

.hero h2{
font-size:24px;
margin-top:10px;
color:#d5dfd9;
}

.location{margin-top:6px;color:#bfc9c4;}

.contact{margin-top:10px;color:#bfc9c4;}

.contact a{color:#bfc9c4;text-decoration:none;}

.contact a:hover{color:#4A6958;}

.social{
margin-top:15px;
font-size:24px;
display:flex;
gap:25px;
}

.social a{color:#cfd8d3;transition:.3s;}

.social a:hover{color:#4A6958;transform:scale(1.3);}

/* RESUME BUTTON */

.resume-btn{
margin-top:30px;
display:inline-flex;
align-items:center;
gap:10px;
padding:15px 38px;

font-size:16px;
font-weight:500;

color:#ffffff;
text-decoration:none;

border-radius:40px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.25);

box-shadow:
0 8px 25px rgba(0,0,0,0.35),
inset 0 0 10px rgba(255,255,255,0.08);

transition:all .35s ease;
}

.resume-btn:hover{
transform:translateY(-4px) scale(1.03);
background:rgba(255,255,255,0.15);
border-color:#7cffc4;

box-shadow:
0 10px 30px rgba(124,255,196,0.35),
0 0 20px rgba(124,255,196,0.25);
}

/* SECTIONS */

.section{
padding:90px 0;
scroll-snap-align:start;
opacity:0;
transform:translateY(80px);
transition:all .9s ease;
}

.section.show{
opacity:1;
transform:translateY(0);
}

.section h2{
font-size:34px;
margin-bottom:40px;
color:#4A6958;
text-align:center;
}

.container{
width:1100px;
max-width:90%;
margin:auto;
}

/* ABOUT */

.about-text{
background:#435146;
padding:40px;
border-radius:16px;
line-height:1.7;
border:1px solid #4A6958;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
background:#435146;
border:1px solid #4A6958;
padding:35px;
border-radius:16px;
text-align:center;
transition:.35s ease;
}

.card i{
font-size:32px;
margin-bottom:15px;
color:#6f9180;
}

.card:hover{
transform:translateY(-8px);
border-color:#7cffc4;

box-shadow:
0 10px 30px rgba(124,255,196,0.25),
0 0 15px rgba(124,255,196,0.2);
}

/* SKILLS */

.skills{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.skill{
display:flex;
align-items:center;
gap:8px;
padding:12px 20px;
background:#435146;
border:1px solid #4A6958;
border-radius:25px;
}

/* CONTACT FORM */

.contact-form{
max-width:600px;
margin:auto;
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:16px;
border:1px solid #4A6958;
backdrop-filter:blur(10px);
}

.contact-form input,
.contact-form textarea{
width:100%;
padding:14px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #4A6958;
background:rgba(255,255,255,0.08);
color:#fff;
font-family:'Poppins',sans-serif;
}

.contact-form textarea{
height:140px;
resize:none;
}

.contact-form button{
width:100%;
padding:14px;
border-radius:30px;
border:none;
background:#4A6958;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.contact-form button:hover{
background:#7cffc4;
color:#000;
}

footer{
text-align:center;
padding:40px 0;
color:#9da8a3;
border-top:1px solid #435146;
margin-top:40px;
}

</style>

</head>

<body>

<!-- CONTACT SECTION -->

<section id="contact" class="section">

<h2>Contact Me</h2>

<div class="container">

<form class="contact-form"
action="https://formspree.io/f/yourformid"
method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</section>

</body>
</html>
```
