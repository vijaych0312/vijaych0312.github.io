<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
canvas:document.querySelector("#bg"),
alpha:true
});

renderer.setSize(window.innerWidth,window.innerHeight);

camera.position.z=6;

/* Create nodes representing servers */

const nodes=[];

for(let i=0;i<25;i++){

const geometry=new THREE.BoxGeometry(0.4,0.4,0.4);

const material=new THREE.MeshStandardMaterial({
color:0xffffff,
metalness:0.7,
roughness:0.3
});

const cube=new THREE.Mesh(geometry,material);

cube.position.x=(Math.random()-0.5)*8;
cube.position.y=(Math.random()-0.5)*8;
cube.position.z=(Math.random()-0.5)*8;

scene.add(cube);
nodes.push(cube);
}

/* Lighting */

const light=new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

const light2=new THREE.PointLight(0xffffff,0.5);
light2.position.set(-5,-5,-5);
scene.add(light2);

/* Animation */

function animate(){

requestAnimationFrame(animate);

nodes.forEach(node=>{
node.rotation.x+=0.002;
node.rotation.y+=0.003;
});

renderer.render(scene,camera);

}

animate();

/* Scroll animation */

window.addEventListener("scroll",()=>{

const scrollY=window.scrollY;

nodes.forEach((node,index)=>{
node.position.y=Math.sin(scrollY*0.002+index)*3;
});

});

</script>
