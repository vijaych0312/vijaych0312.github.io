<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
scroll-snap-type:y mandatory;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#1C1C1C,#1B2922);
color:#e6efe9;
overflow-x:hidden;
}

/* BACKGROUND DESIGN */

.bg-design{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.orb{
position:absolute;
border-radius:50%;
filter:blur(120px);
opacity:.25;
animation:float 18s ease-in-out infinite;
}

.orb1{
width:500px;
height:500px;
background:#4A6958;
top:-150px;
left:-100px;
}

.orb2{
width:400px;
height:400px;
background:#6f9180;
bottom:-150px;
right:-120px;
animation-delay:5s;
}

.orb3{
width:350px;
height:350px;
background:#3e574a;
top:40%;
left:60%;
animation-delay:10s;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-40px);}
100%{transform:translateY(0px);}
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:rgba(27,41,34,0.9);
backdrop-filter:blur(10px);
border-bottom:1px solid #435146;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

.logo{
position:absolute;
left:40px;
font-size:22px;
font-weight:600;
letter-spacing:2px;
color:#e6efe9;
}

.nav-links{
display:flex;
gap:35px;
}

.nav-links a{
color:#cfd8d3;
font-size:16px;
display:flex;
align-items:center;
gap:8px;
text-decoration:none;
transition:.3s;
}

.nav-links a:hover{
color:#4A6958;
transform:scale(1.1);
}

/* HERO */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding-top:70px;
scroll-snap-align:start;
}

.hero-container{
width:1100px;
max-width:90%;
display:flex;
align-items:center;
justify-content:space-between;
gap:60px;
}

.hero-left{
flex:1;
}

.hero-right{
flex:1;
display:flex;
justify-content:center;
}

.hero-photo{
width:420px;
height:520px;
object-fit:cover;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.hero h1{
font-size:60px;
font-weight:700;
background:linear-gradient(90deg,#4A6958,#6f9180,#4A6958);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 6s linear infinite;
}

@keyframes shine{
0%{background-position:0%;}
100%{background-position:200%;}
}

.hero h2{
font-size:24px;
margin-top:10px;
color:#d5dfd9;
}

.location{
margin-top:6px;
color:#bfc9c4;
}

.contact{
margin-top:10px;
color:#bfc9c4;
}

.contact a{
color:#bfc9c4;
text-decoration:none;
}

.contact a:hover{
color:#4A6958;
}

.social{
margin-top:15px;
font-size:24px;
display:flex;
gap:25px;
}

.social a{
color:#cfd8d3;
transition:.3s;
}

.social a:hover{
color:#4A6958;
transform:scale(1.3);
}

.resume-btn{
margin-top:30px;
display:inline-flex;
align-items:center;
gap:10px;
padding:14px 34px;
font-size:16px;
color:#e6efe9;
text-decoration:none;
border-radius:40px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
transition:all .35s ease;
}

.resume-btn:hover{
transform:translateY(-3px);
background:rgba(255,255,255,0.15);
border-color:#4A6958;
}

/* SECTIONS */

.section{
padding:90px 0;
scroll-snap-align:start;
opacity:0;
transform:translateY(80px);
transition:all 0.9s ease;
}

.section.show{
opacity:1;
transform:translateY(0);
}

.section h2{
font-size:34px;
margin-bottom:40px;
color:#4A6958;
text-align:center;
}

.container{
width:1100px;
max-width:90%;
margin:auto;
}

/* ABOUT */

.about-text{
background:#435146;
padding:40px;
border-radius:16px;
line-height:1.7;
border:1px solid #4A6958;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
background:#435146;
border:1px solid #4A6958;
padding:35px;
border-radius:16px;
text-align:center;
transition:.4s;
}

.card i{
font-size:32px;
margin-bottom:15px;
color:#6f9180;
}

.card:hover{
transform:translateY(-10px);
}

/* SKILLS */

.skills{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.skill{
display:flex;
align-items:center;
gap:8px;
padding:12px 20px;
background:#435146;
border:1px solid #4A6958;
border-radius:25px;
}

/* FOOTER */

footer{
text-align:center;
padding:40px 0;
color:#9da8a3;
border-top:1px solid #435146;
margin-top:40px;
}

</style>

<script>

const sections = document.querySelectorAll('.section');

const observer = new IntersectionObserver((entries)=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add('show');
}
});
},{
threshold:0.2
});

sections.forEach(section=>{
observer.observe(section);
});

</script>
