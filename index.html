<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vijay Kumar Chelluboyana | Cloud & DevOps Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#1C1C1C,#1B2922);
color:#e6efe9;
overflow-x:hidden;
}

/* BACKGROUND */

.bg-wrapper{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.grid{
position:absolute;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(74,105,88,0.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(74,105,88,0.08) 1px, transparent 1px);
background-size:60px 60px;
}

.orb{
position:absolute;
border-radius:50%;
filter:blur(120px);
opacity:.25;
animation:float 20s ease-in-out infinite;
}

.orb1{
width:500px;
height:500px;
background:#4A6958;
top:-150px;
left:-120px;
}

.orb2{
width:420px;
height:420px;
background:#6f9180;
bottom:-180px;
right:-120px;
animation-delay:6s;
}

.orb3{
width:350px;
height:350px;
background:#3e574a;
top:40%;
left:60%;
animation-delay:10s;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0)}
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:rgba(27,41,34,0.95);
backdrop-filter:blur(10px);
border-bottom:1px solid #435146;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:600;
letter-spacing:2px;
}

.nav-links{
display:flex;
gap:35px;
}

.nav-links a{
color:#cfd8d3;
font-size:16px;
display:flex;
align-items:center;
gap:8px;
text-decoration:none;
transition:.3s;
}

.nav-links a:hover{
color:#4A6958;
}

.menu-btn{
display:none;
font-size:26px;
cursor:pointer;
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding-top:90px;
}

.hero-container{
width:1100px;
max-width:92%;
display:flex;
align-items:center;
justify-content:space-between;
gap:60px;
}

.hero-left{
flex:1;
}

.hero-right{
flex:1;
display:flex;
justify-content:center;
}

.hero-photo{
width:380px;
height:480px;
object-fit:cover;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.hero h1{
font-size:56px;
font-weight:700;
color:#fff;
letter-spacing:2px;
}

.hero h2{
font-size:24px;
margin-top:10px;
color:#d5dfd9;
}

.location{
margin-top:6px;
color:#bfc9c4;
}

.contact{
margin-top:10px;
color:#bfc9c4;
}

.contact a{
color:#bfc9c4;
text-decoration:none;
}

.social{
margin-top:15px;
font-size:24px;
display:flex;
gap:25px;
}

.social a{
color:#cfd8d3;
transition:.3s;
}

.social a:hover{
color:#4A6958;
transform:scale(1.3);
}

.resume-btn{
margin-top:30px;
display:inline-flex;
align-items:center;
gap:10px;
padding:15px 38px;
font-size:16px;
color:#fff;
text-decoration:none;
border-radius:40px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.25);
transition:.3s;
}

.resume-btn:hover{
background:rgba(255,255,255,0.15);
}

/* SECTIONS */

.section{
padding:90px 0;
}

.section h2{
font-size:34px;
margin-bottom:40px;
color:#4A6958;
text-align:center;
}

.container{
width:1100px;
max-width:92%;
margin:auto;
}

/* ABOUT */

.about-text{
background:#435146;
padding:40px;
border-radius:16px;
line-height:1.7;
border:1px solid #4A6958;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.card{
background:#435146;
border:1px solid #4A6958;
padding:35px;
border-radius:16px;
text-align:center;
transition:.3s;
}

.card i{
font-size:32px;
margin-bottom:15px;
color:#6f9180;
}

.card:hover{
transform:translateY(-8px);
border-color:#7cffc4;
}

/* SKILLS */

.skills{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.skill{
display:flex;
align-items:center;
gap:8px;
padding:12px 20px;
background:#435146;
border:1px solid #4A6958;
border-radius:25px;
}

/* FOOTER */

footer{
text-align:center;
padding:40px 0;
color:#9da8a3;
border-top:1px solid #435146;
margin-top:40px;
}

/* ================= */
/* TABLET */
/* ================= */

@media (max-width:1000px){

.hero-container{
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:42px;
}

.hero-photo{
width:300px;
height:380px;
}

.cards{
grid-template-columns:repeat(2,1fr);
}

}

/* ================= */
/* MOBILE */
/* ================= */

@media (max-width:700px){

.nav-links{
position:absolute;
top:70px;
left:0;
width:100%;
background:#1b2922;
flex-direction:column;
align-items:center;
gap:25px;
padding:30px 0;
display:none;
}

.nav-links.active{
display:flex;
}

.menu-btn{
display:block;
}

.hero{
padding-top:110px;
}

.hero h1{
font-size:30px;
}

.hero h2{
font-size:18px;
}

.hero-photo{
width:220px;
height:280px;
}

.cards{
grid-template-columns:1fr;
}

.about-text{
padding:25px;
}

.skill{
font-size:14px;
padding:8px 14px;
}

}

</style>

</head>

<body>

<div class="bg-wrapper">
<div class="grid"></div>

</div>

<div class="logo">VKC</div>

<i class="fas fa-bars"></i>
</div>

<div class="nav-links" id="navLinks">
<a href="#">Home</a>
<a href="#about">About</a>
<a href="#experience">Experience</a>
<a href="#projects">Projects</a>

</div>

</div>

<section class="hero">

<div class="hero-container">

<div class="hero-left">

<h1>VIJAY KUMAR CHELLUBOYANA</h1>

<div class="location"><i class="fas fa-location-dot"></i> New York, USA</div>

<div class="contact">
<a href="mailto:vijaychelluboyana@gmail.com"><i class="fas fa-envelope"></i> vijaychelluboyana@gmail.com</a> |
<a href="tel:+13474336878"><i class="fas fa-phone"></i> +1 (347) 433-6878</a>
</div>

<div class="social">
<a href="https://github.com/vijaych0312" target="_blank"><i class="fab fa-github"></i></a>
<a href="https://linkedin.com/in/vijaych0312" target="_blank"><i class="fab fa-linkedin"></i></a>
</div>

<a href="Vijay_Kumar_Chelluboyana_Resume.pdf" class="resume-btn" target="_blank">
<i class="fas fa-file"></i> Resume
</a>

</div>

<div class="hero-right">
<img src="profile.jpg" class="hero-photo">
</div>

</div>

</section>

<footer>
<p>© 2026 Vijay Kumar Chelluboyana</p>
</footer>

<script>

const navLinks=document.getElementById("navLinks");

navLinks.classList.toggle("active");
};

</script>

</body>
</html>
