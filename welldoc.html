<h2>CI/CD Pipeline</h2>

<div class="pipeline">

<span class="step">GitHub</span>
<span class="arrow">→</span>

<span class="step">Build</span>
<span class="arrow">→</span>

<span class="step">Docker</span>
<span class="arrow">→</span>

<span class="step">Kubernetes</span>
<span class="arrow">→</span>

<span class="step">AWS</span>

</div>

<style>

.pipeline{
margin-top:30px;
font-size:22px;
}

.step{
padding:12px 20px;
border:1px solid gray;
margin:5px;
display:inline-block;
opacity:0.4;
}

.arrow{
margin:10px;
}

</style>

<script>

let steps=document.querySelectorAll(".step");
let i=0;

setInterval(()=>{

steps.forEach(s=>s.style.opacity=0.4);

steps[i].style.opacity=1;

i++;

if(i>=steps.length){
i=0;
}

},1000);

</script>
